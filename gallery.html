<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Gallery | Love Banana</title>
</head>

<body>

    <a href="index.html" class="home-logo-link"><img src="images/LB logo (return home).png" alt="Home"
            class="home-logo-topleft"></a>

    <div class="header-container">
        <img src="images/Page Headings.png" alt="Navigation" class="header-image" usemap="#navmap">
        <map name="navmap">
            <area shape="rect" coords="0,0,250,150" href="merch.html" alt="Merch">
            <area shape="rect" coords="250,0,500,150" href="shows.html" alt="Shows">
            <area shape="rect" coords="500,0,750,150" href="links.html" alt="Links">
            <area shape="rect" coords="750,0,1000,150" href="gallery.html" alt="Gallery">
        </map>
    </div>

    <div class="gallery-container">
        <p class="gallery-welcome">welcome to the gallery where we have some of our art</p>

        <div class="gallery-grid">
            <a href="product-poster.html" class="gallery-item">
                <img src="images/love banana poster.png" alt="love banana poster" class="gallery-img">
                <h2 class="gallery-title">love banana poster</h2>
                <p class="gallery-desc">A3 print on paper</p>
                <p class="gallery-price">$20 aud</p>
            </a>

            <a href="product-people-everywhere.html" class="gallery-item">
                <img src="images/people everywhere.png" alt="people everywhere" class="gallery-img">
                <h2 class="gallery-title">people everywhere</h2>
                <p class="gallery-desc">A5 print on paper</p>
                <p class="gallery-price">$20 aud</p>
            </a>
        </div>
    </div>

</body>

</html>

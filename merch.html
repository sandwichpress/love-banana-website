<!DOCTYPE html>
<html lang="en">

<head>

    <link rel="stylesheet" href="style.css">

    <!-- Header Navigation -->
    <div class="header-container">
        <img src="images/Page Headings.png" alt="Navigation" class="header-image" usemap="#navmap">

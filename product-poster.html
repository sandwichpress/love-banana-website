<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Love Banana Poster | Love Banana</title>
</head>

<body>

    <a href="index.html" class="home-logo-link"><img src="images/LB logo (return home).png" alt="Home"
            class="home-logo-topleft"></a>

    <div class="product-page">
        <div class="product-left-bordered">
            <h1 class="product-title">love banana poster</h1>
            <p class="product-subtitle">A3 print on paper</p>

            <img src="images/love banana poster.png" alt="love banana poster" class="product-main-img">

            <p class="product-description">
                this is an A3 gig poster<br>
                printed on quality paper
            </p>
        </div>

        <div class="product-right">
            <div class="product-logo">
                <a href="index.html"><img src="images/LB logo (return home).png" alt="Love Banana - Return Home"
                        class="home-logo"></a>
            </div>

            <div class="shipping-section">
                <p class="shipping-prompt">Please enter your<br>shipping details</p>

                <form id="shipping-form">
                    <input type="text" name="name" placeholder="Name" required>
                    <input type="text" name="address" placeholder="Address" required>
                    <input type="text" name="city" placeholder="City" required>
                    <input type="text" name="postcode" placeholder="Postcode" required>
                    <input type="email" name="email" placeholder="Email" required>
                </form>

                <p class="total-price">Total price +<br>shipping = <strong>$25 aud</strong></p>

                <button type="submit" form="shipping-form" class="buy-button">BUY NOW</button>
            </div>
        </div>
    </div>

</body>

</html>
